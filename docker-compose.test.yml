services:
  api-test-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: grow_api_integration_test
      POSTGRES_USER: grow_test
      POSTGRES_PASSWORD: grow_test_password
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s